<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rusty machine cog - chunky industrial pixel style -->

  <!-- Cog teeth (8 blocky square teeth around the perimeter) -->
  <!-- Top -->
  <rect x="12" y="0" width="8" height="5" fill="#c85a1a"/>
  <!-- Bottom -->
  <rect x="12" y="27" width="8" height="5" fill="#c85a1a"/>
  <!-- Left -->
  <rect x="0" y="12" width="5" height="8" fill="#c85a1a"/>
  <!-- Right -->
  <rect x="27" y="12" width="5" height="8" fill="#c85a1a"/>
  <!-- Top-right -->
  <rect x="23" y="2" width="6" height="6" rx="1" fill="#b54e15"/>
  <!-- Top-left -->
  <rect x="3" y="2" width="6" height="6" rx="1" fill="#b54e15"/>
  <!-- Bottom-right -->
  <rect x="23" y="24" width="6" height="6" rx="1" fill="#b54e15"/>
  <!-- Bottom-left -->
  <rect x="3" y="24" width="6" height="6" rx="1" fill="#b54e15"/>

  <!-- Cog body (chunky circle) -->
  <circle cx="16" cy="16" r="12" fill="#e8722a"/>

  <!-- Rust patina / wear marks -->
  <circle cx="16" cy="16" r="12" fill="url(#rust-patina)" opacity="0.4"/>
  <defs>
    <radialGradient id="rust-patina" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#f0924a"/>
      <stop offset="60%" stop-color="#e8722a"/>
      <stop offset="100%" stop-color="#a04010"/>
    </radialGradient>
  </defs>

  <!-- Pitting / wear spots -->
  <circle cx="11" cy="11" r="1.5" fill="#a04010" opacity="0.5"/>
  <circle cx="21" cy="19" r="1" fill="#a04010" opacity="0.4"/>
  <circle cx="13" cy="20" r="0.8" fill="#a04010" opacity="0.3"/>

  <!-- Center axle hole (dark, industrial) -->
  <circle cx="16" cy="16" r="5" fill="#2a2118"/>
  <circle cx="16" cy="16" r="3.5" fill="#1a1410" stroke="#3d3024" stroke-width="0.8"/>

  <!-- Axle keyway (square notch) -->
  <rect x="14.5" y="14.5" width="3" height="3" fill="#3d3024"/>
</svg>
