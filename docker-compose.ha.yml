version: '3.8'

# High Availability Configuration for Rusternetes
# This compose file sets up:
# - 3-node etcd cluster with quorum
# - 3 API servers behind a load balancer
# - 2 Controller managers with leader election
# - 2 Schedulers with leader election

services:
  # etcd cluster - 3 nodes for quorum
  etcd-1:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: rusternetes-etcd-1
    command:
      - /usr/local/bin/etcd
      - --name=etcd-1
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd-1:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd-1:2380
      - --initial-cluster=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - --initial-cluster-token=rusternetes-etcd-cluster
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
    volumes:
      - etcd-1-data:/etcd-data
    networks:
      - rusternetes-net
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - ETCDCTL_API=3

  etcd-2:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: rusternetes-etcd-2
    command:
      - /usr/local/bin/etcd
      - --name=etcd-2
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd-2:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd-2:2380
      - --initial-cluster=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - --initial-cluster-token=rusternetes-etcd-cluster
      - --initial-cluster-state=new
    ports:
      - "2380:2379"
    volumes:
      - etcd-2-data:/etcd-data
    networks:
      - rusternetes-net
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - ETCDCTL_API=3

  etcd-3:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: rusternetes-etcd-3
    command:
      - /usr/local/bin/etcd
      - --name=etcd-3
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd-3:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd-3:2380
      - --initial-cluster=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - --initial-cluster-token=rusternetes-etcd-cluster
      - --initial-cluster-state=new
    ports:
      - "2381:2379"
    volumes:
      - etcd-3-data:/etcd-data
    networks:
      - rusternetes-net
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - ETCDCTL_API=3

  # HAProxy load balancer for API servers
  haproxy:
    image: haproxy:2.9-alpine
    container_name: rusternetes-haproxy
    ports:
      - "6443:6443"
      - "8404:8404"  # Stats page
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - rusternetes-net
    depends_on:
      - api-server-1
      - api-server-2
      - api-server-3
    healthcheck:
      test: ["CMD", "sh", "-c", "pidof haproxy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # API Server cluster - 3 instances
  api-server-1:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    container_name: rusternetes-api-server-1
    ports:
      - "6444:6443"
    depends_on:
      etcd-1:
        condition: service_healthy
      etcd-2:
        condition: service_healthy
      etcd-3:
        condition: service_healthy
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command:
      - "--bind-address"
      - "0.0.0.0:6443"
      - "--etcd-servers"
      - "http://etcd-1:2379,http://etcd-2:2379,http://etcd-3:2379"
      - "--tls"
      - "--tls-self-signed"
      - "--tls-san"
      - "localhost,127.0.0.1,api-server-1,haproxy"
      - "--skip-auth"
      - "--console-dir"
      - "/app/console"

  api-server-2:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    container_name: rusternetes-api-server-2
    ports:
      - "6445:6443"
    depends_on:
      etcd-1:
        condition: service_healthy
      etcd-2:
        condition: service_healthy
      etcd-3:
        condition: service_healthy
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command:
      - "--bind-address"
      - "0.0.0.0:6443"
      - "--etcd-servers"
      - "http://etcd-1:2379,http://etcd-2:2379,http://etcd-3:2379"
      - "--tls"
      - "--tls-self-signed"
      - "--tls-san"
      - "localhost,127.0.0.1,api-server-2,haproxy"
      - "--skip-auth"
      - "--console-dir"
      - "/app/console"

  api-server-3:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    container_name: rusternetes-api-server-3
    ports:
      - "6446:6443"
    depends_on:
      etcd-1:
        condition: service_healthy
      etcd-2:
        condition: service_healthy
      etcd-3:
        condition: service_healthy
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command:
      - "--bind-address"
      - "0.0.0.0:6443"
      - "--etcd-servers"
      - "http://etcd-1:2379,http://etcd-2:2379,http://etcd-3:2379"
      - "--tls"
      - "--tls-self-signed"
      - "--tls-san"
      - "localhost,127.0.0.1,api-server-3,haproxy"
      - "--skip-auth"
      - "--console-dir"
      - "/app/console"

  # Scheduler cluster - 2 instances with leader election
  scheduler-1:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: rusternetes-scheduler-1
    depends_on:
      - etcd-1
      - etcd-2
      - etcd-3
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command:
      - "--etcd-servers"
      - "http://etcd-1:2379,http://etcd-2:2379,http://etcd-3:2379"
      - "--enable-leader-election"
      - "--leader-election-identity"
      - "scheduler-1"

  scheduler-2:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: rusternetes-scheduler-2
    depends_on:
      - etcd-1
      - etcd-2
      - etcd-3
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command:
      - "--etcd-servers"
      - "http://etcd-1:2379,http://etcd-2:2379,http://etcd-3:2379"
      - "--enable-leader-election"
      - "--leader-election-identity"
      - "scheduler-2"

  # Controller Manager cluster - 2 instances with leader election
  controller-manager-1:
    build:
      context: .
      dockerfile: Dockerfile.controller-manager
    container_name: rusternetes-controller-manager-1
    depends_on:
      - etcd-1
      - etcd-2
      - etcd-3
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command:
      - "--etcd-servers"
      - "http://etcd-1:2379,http://etcd-2:2379,http://etcd-3:2379"
      - "--enable-leader-election"
      - "--leader-election-identity"
      - "controller-manager-1"

  controller-manager-2:
    build:
      context: .
      dockerfile: Dockerfile.controller-manager
    container_name: rusternetes-controller-manager-2
    depends_on:
      - etcd-1
      - etcd-2
      - etcd-3
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command:
      - "--etcd-servers"
      - "http://etcd-1:2379,http://etcd-2:2379,http://etcd-3:2379"
      - "--enable-leader-election"
      - "--leader-election-identity"
      - "controller-manager-2"

  # Kubelet - node agent
  kubelet:
    build:
      context: .
      dockerfile: Dockerfile.kubelet
    container_name: rusternetes-kubelet
    privileged: true
    depends_on:
      - etcd-1
      - haproxy
    networks:
      - rusternetes-net
    volumes:
      # Docker socket
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Share volume directory so ConfigMap/Secret volumes can be mounted into pods
      # IMPORTANT: Use same path on both sides so kubelet's bind mounts work correctly
      # The kubelet creates volumes and then bind mounts them into pod containers
      # Docker interprets bind mount paths relative to the VM filesystem, not the kubelet container
      # IMPORTANT: KUBELET_VOLUMES_PATH must be set to an absolute path. Example:
      #   export KUBELET_VOLUMES_PATH=$(pwd)/.rusternetes/volumes
      - ${KUBELET_VOLUMES_PATH}:${KUBELET_VOLUMES_PATH}:rw
    environment:
      - RUST_LOG=debug
      - DOCKER_HOST=unix:///var/run/docker.sock
      # Legacy environment variable - still supported for backward compatibility
      # IMPORTANT: Must be an absolute path
      - KUBELET_VOLUMES_PATH=${KUBELET_VOLUMES_PATH}
    command:
      - "--node-name"
      - "node-1"
      - "--etcd-servers"
      - "http://etcd-1:2379,http://etcd-2:2379,http://etcd-3:2379"

  # Kube-proxy - network proxy
  kube-proxy:
    build:
      context: .
      dockerfile: Dockerfile.kube-proxy
    container_name: rusternetes-kube-proxy
    privileged: true
    depends_on:
      - haproxy
    networks:
      - rusternetes-net
    ports:
      - "30000-30100:30000-30100/tcp"
      - "30000-30100:30000-30100/udp"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - RUST_LOG=info
    command:
      - "--node-name"
      - "node-1"
      - "--etcd-servers"
      - "http://etcd-1:2379,http://etcd-2:2379,http://etcd-3:2379"

networks:
  rusternetes-net:
    driver: bridge
    name: rusternetes-network-ha

volumes:
  etcd-1-data:
    name: rusternetes-etcd-1-data
  etcd-2-data:
    name: rusternetes-etcd-2-data
  etcd-3-data:
    name: rusternetes-etcd-3-data
