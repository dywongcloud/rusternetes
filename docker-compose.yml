version: '3.8'

services:
  # etcd - distributed key-value store for cluster state
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: rusternetes-etcd
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd-data:/etcd-data
    networks:
      - rusternetes-net
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - ETCDCTL_API=3

  # API Server - central management component
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    container_name: rusternetes-api-server
    ports:
      - "6443:6443"
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command:
      - "--bind-address"
      - "0.0.0.0:6443"
      - "--etcd-servers"
      - "http://etcd:2379"
      - "--tls"
      - "--tls-self-signed"
      - "--tls-san"
      - "localhost,127.0.0.1,api-server,rusternetes-api-server"
      - "--skip-auth"

  # Scheduler - assigns pods to nodes
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: rusternetes-scheduler
    depends_on:
      - etcd
      - api-server
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command: ["--etcd-servers", "http://etcd:2379"]

  # Controller Manager - runs controllers
  controller-manager:
    build:
      context: .
      dockerfile: Dockerfile.controller-manager
    container_name: rusternetes-controller-manager
    depends_on:
      - etcd
      - api-server
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command: ["--etcd-servers", "http://etcd:2379"]

  # Kubelet - node agent that manages containers
  kubelet:
    build:
      context: .
      dockerfile: Dockerfile.kubelet
    container_name: rusternetes-kubelet
    privileged: true
    depends_on:
      - etcd
      - api-server
    networks:
      - rusternetes-net
    volumes:
      # Podman socket - inside Podman Machine VM
      # This path works because containers run inside the same VM
      - /run/user/501/podman/podman.sock:/var/run/docker.sock:rw
    environment:
      - RUST_LOG=debug
      - DOCKER_HOST=unix:///var/run/docker.sock
    command: ["--node-name", "node-1", "--etcd-servers", "http://etcd:2379"]

  # Kube-proxy - network proxy
  kube-proxy:
    build:
      context: .
      dockerfile: Dockerfile.kube-proxy
    container_name: rusternetes-kube-proxy
    privileged: true
    depends_on:
      - api-server
    networks:
      - rusternetes-net
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - RUST_LOG=info
    command: ["--node-name", "node-1"]

  # DNS Server - internal DNS for service discovery
  dns-server:
    build:
      context: .
      dockerfile: Dockerfile.dns-server
    container_name: rusternetes-dns-server
    depends_on:
      etcd:
        condition: service_healthy
    ports:
      - "8053:8053/udp"
      - "8053:8053/tcp"
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command:
      - "--etcd-endpoint"
      - "http://etcd:2379"
      - "--listen-addr"
      - "0.0.0.0:8053"
      - "--cluster-domain"
      - "cluster.local"
      - "--ttl"
      - "10"
      - "--sync-interval-secs"
      - "30"

networks:
  rusternetes-net:
    driver: bridge
    name: rusternetes-network

volumes:
  etcd-data:
    name: rusternetes-etcd-data
