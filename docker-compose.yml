version: '3.8'

services:
  # etcd - distributed key-value store for cluster state
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: rusternetes-etcd
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --auto-compaction-retention=10m
      - --auto-compaction-mode=periodic
      - --snapshot-count=5000
      - --quota-backend-bytes=8589934592
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd-data:/etcd-data
    networks:
      - rusternetes-net
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - ETCDCTL_API=3

  # API Server - central management component
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    container_name: rusternetes-api-server
    ports:
      - "6443:6443"
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      rusternetes-net:
        aliases:
          - api-server
    volumes:
      # Mount persistent TLS certificates
      - ./.rusternetes/certs:/etc/kubernetes/pki:ro
      # Docker socket for exec/attach via bollard (shares same daemon as kubelet)
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - RUST_LOG=info
      - DOCKER_HOST=unix:///var/run/docker.sock
    command:
      - "--bind-address"
      - "0.0.0.0:6443"
      - "--etcd-servers"
      - "http://etcd:2379"
      - "--tls"
      - "--tls-cert-file"
      - "/etc/kubernetes/pki/api-server.crt"
      - "--tls-key-file"
      - "/etc/kubernetes/pki/api-server.key"
      - "--skip-auth"
      - "--console-dir"
      - "/app/console"
      - "--log-level"
      - "info"

  # Scheduler - assigns pods to nodes
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: rusternetes-scheduler
    depends_on:
      - etcd
      - api-server
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command: ["--etcd-servers", "http://etcd:2379", "--interval", "1"]

  # Controller Manager - runs controllers
  controller-manager:
    build:
      context: .
      dockerfile: Dockerfile.controller-manager
    container_name: rusternetes-controller-manager
    depends_on:
      - etcd
      - api-server
    networks:
      - rusternetes-net
    volumes:
      # Mount CA certificate so the namespace controller can create kube-root-ca.crt ConfigMaps
      - ./.rusternetes/certs:/etc/kubernetes/pki:ro
    environment:
      - RUST_LOG=info
    command: ["--etcd-servers", "http://etcd:2379", "--sync-interval", "3"]

  # Kubelet - node agent that manages containers
  kubelet:
    build:
      context: .
      dockerfile: Dockerfile.kubelet
    container_name: rusternetes-kubelet
    privileged: true
    depends_on:
      - etcd
      - api-server
    networks:
      - rusternetes-net
    volumes:
      # Docker socket
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Share volume directory so ConfigMap/Secret volumes can be mounted into pods
      # IMPORTANT: Use same path on both sides so kubelet's bind mounts work correctly
      # The kubelet creates volumes and then bind mounts them into pod containers
      # Podman interprets bind mount paths relative to the VM filesystem, not the kubelet container
      # IMPORTANT: On macOS with Podman Machine, /tmp is NOT shared between host and VM
      # Use a path under the user's home directory which IS automatically mounted
      # You can configure the volume path in three ways (in order of precedence):
      #   1. CLI flag: --volume-dir=/custom/path
      #   2. Config file: volumeDir field in kubelet-config.yaml
      #   3. Environment variable: KUBELET_VOLUMES_PATH (legacy, for backward compatibility)
      #   4. Default: ./volumes (development) or /var/lib/kubelet/volumes (production)
      # IMPORTANT: KUBELET_VOLUMES_PATH must be set to an absolute path. Example:
      #   export KUBELET_VOLUMES_PATH=$(pwd)/.rusternetes/volumes
      - ${KUBELET_VOLUMES_PATH}:${KUBELET_VOLUMES_PATH}:rw
      # Mount TLS certificates so kubelet can inject CA cert into service account volumes
      - ./.rusternetes/certs:/root/.rusternetes/certs:ro
      # NOTE: CNI is fully implemented and included in the kubelet container.
      # However, in Podman Machine on macOS, CNI cannot work due to network namespace
      # isolation between containers. The kubelet automatically detects this and falls
      # back to Podman's bridge networking with custom DNS configuration.
      # See docs/CNI-NETWORKING.md for full details.
      # In production Linux environments, CNI will work automatically.
      # Uncomment to use config file approach:
      # - ./examples/configs/kubelet-config-dev.yaml:/etc/kubernetes/kubelet-config.yaml:ro
    environment:
      - RUST_LOG=info
      - DOCKER_HOST=unix:///var/run/docker.sock
      # Use the API server's Docker DNS name so pods can reach it directly.
      # The ClusterIP (10.96.0.1) is not routable from Docker bridge containers.
      - KUBERNETES_SERVICE_HOST_OVERRIDE=api-server
      # Legacy environment variable - still supported for backward compatibility
      # IMPORTANT: Must be an absolute path
      - KUBELET_VOLUMES_PATH=${KUBELET_VOLUMES_PATH}
    # Default command uses CLI flags (recommended for Docker Compose)
    # DNS IP matches the pinned ClusterIP in bootstrap-cluster.yaml
    command: ["--node-name", "node-1", "--etcd-servers", "http://etcd:2379", "--cluster-dns", "10.96.0.10", "--metrics-port", "10250", "--sync-interval", "3"]
    # Alternative: Use config file approach (uncomment to use)
    # command: ["--node-name", "node-1", "--etcd-servers", "http://etcd:2379", "--config", "/etc/kubernetes/kubelet-config.yaml"]

  # Kubelet 2 - second node agent for multi-node conformance tests
  kubelet2:
    build:
      context: .
      dockerfile: Dockerfile.kubelet
    container_name: rusternetes-kubelet2
    privileged: true
    depends_on:
      - etcd
      - api-server
    networks:
      - rusternetes-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ${KUBELET_VOLUMES_PATH}:${KUBELET_VOLUMES_PATH}:rw
      - ./.rusternetes/certs:/root/.rusternetes/certs:ro
    environment:
      - RUST_LOG=info
      - DOCKER_HOST=unix:///var/run/docker.sock
      - KUBERNETES_SERVICE_HOST_OVERRIDE=api-server
      - KUBELET_VOLUMES_PATH=${KUBELET_VOLUMES_PATH}
    command: ["--node-name", "node-2", "--etcd-servers", "http://etcd:2379", "--cluster-dns", "10.96.0.10", "--metrics-port", "10251", "--sync-interval", "3"]

  # Kube-proxy - network proxy
  # IMPORTANT: Uses host network mode to modify iptables on the host/VM
  # This is required for ClusterIP routing to work properly
  # Note: Requires CAP_NET_ADMIN and running as root for iptables access
  kube-proxy:
    build:
      context: .
      dockerfile: Dockerfile.kube-proxy
    container_name: rusternetes-kube-proxy
    privileged: true
    network_mode: host
    user: "0:0"
    depends_on:
      - api-server
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      - RUST_LOG=info
    # Use localhost because we're on host network now
    command: ["--node-name", "node-1", "--etcd-servers", "http://localhost:2379"]

networks:
  rusternetes-net:
    driver: bridge
    name: rusternetes-network

volumes:
  etcd-data:
    name: rusternetes-etcd-data
