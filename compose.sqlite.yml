# Podman Compose — SQLite mode via Rhino (no etcd).
#
# Rhino speaks the etcd v3 gRPC API backed by SQLite.
# All components use their existing --etcd-servers flag pointed at rhino.
#
# Usage:
#   podman compose -f compose.sqlite.yml build
#   podman compose -f compose.sqlite.yml up -d
#   bash scripts/bootstrap-cluster.sh
#
# Requires the rhino repo adjacent to this one:
#   dev/
#     rusternetes/   (this repo)
#     rhino/         (https://github.com/calfonso/rhino)

services:
  # Rhino - etcd-compatible gRPC server backed by SQLite
  rhino:
    build:
      context: ../rhino
      dockerfile: ../rusternetes/Dockerfile.rhino
    container_name: rusternetes-rhino
    ports:
      - "2379:2379"
    volumes:
      - rhino-data:/data/db
    networks:
      - rusternetes-net
    command:
      - "--listen-address"
      - "0.0.0.0:2379"
      - "--endpoint"
      - "/data/db/state.db"
      - "--max-connections"
      - "20"
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s

  # API Server
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    container_name: rusternetes-api-server
    ports:
      - "6443:6443"
    depends_on:
      rhino:
        condition: service_healthy
    networks:
      rusternetes-net:
        aliases:
          - api-server
    volumes:
      - ./.rusternetes/certs:/etc/kubernetes/pki:ro
      - /run/podman/podman.sock:/run/podman/podman.sock:rw
    environment:
      - RUST_LOG=info
      - DOCKER_HOST=unix:///run/podman/podman.sock
    command:
      - "--bind-address"
      - "0.0.0.0:6443"
      - "--etcd-servers"
      - "http://rhino:2379"
      - "--tls"
      - "--tls-cert-file"
      - "/etc/kubernetes/pki/api-server.crt"
      - "--tls-key-file"
      - "/etc/kubernetes/pki/api-server.key"
      - "--skip-auth"
      - "--console-dir"
      - "/app/console"
      - "--log-level"
      - "info"

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: rusternetes-scheduler
    depends_on:
      - rhino
      - api-server
    networks:
      - rusternetes-net
    environment:
      - RUST_LOG=info
    command: ["--etcd-servers", "http://rhino:2379", "--interval", "1"]

  # Controller Manager
  controller-manager:
    build:
      context: .
      dockerfile: Dockerfile.controller-manager
    container_name: rusternetes-controller-manager
    depends_on:
      - rhino
      - api-server
    networks:
      - rusternetes-net
    volumes:
      - ./.rusternetes/certs:/etc/kubernetes/pki:ro
    environment:
      - RUST_LOG=info
    command: ["--etcd-servers", "http://rhino:2379", "--sync-interval", "5"]

  # Kubelet
  kubelet:
    build:
      context: .
      dockerfile: Dockerfile.kubelet
    container_name: rusternetes-kubelet
    privileged: true
    depends_on:
      - rhino
      - api-server
    networks:
      - rusternetes-net
    volumes:
      - /run/podman/podman.sock:/run/podman/podman.sock:rw
      - ${KUBELET_VOLUMES_PATH}:${KUBELET_VOLUMES_PATH}:rw
      - ./.rusternetes/certs:/root/.rusternetes/certs:ro
    environment:
      - RUST_LOG=info
      - RUST_MIN_STACK=8388608
      - DOCKER_HOST=unix:///run/podman/podman.sock
      - KUBERNETES_SERVICE_HOST_OVERRIDE=api-server
      - KUBELET_VOLUMES_PATH=${KUBELET_VOLUMES_PATH}
    command: ["--node-name", "node-1", "--etcd-servers", "http://rhino:2379", "--cluster-dns", "10.96.0.10", "--metrics-port", "10250", "--sync-interval", "3"]

  # Kubelet 2
  kubelet2:
    build:
      context: .
      dockerfile: Dockerfile.kubelet
    container_name: rusternetes-kubelet2
    privileged: true
    depends_on:
      - rhino
      - api-server
    networks:
      - rusternetes-net
    volumes:
      - /run/podman/podman.sock:/run/podman/podman.sock:rw
      - ${KUBELET_VOLUMES_PATH}:${KUBELET_VOLUMES_PATH}:rw
      - ./.rusternetes/certs:/root/.rusternetes/certs:ro
    environment:
      - RUST_LOG=info
      - RUST_MIN_STACK=8388608
      - DOCKER_HOST=unix:///run/podman/podman.sock
      - KUBERNETES_SERVICE_HOST_OVERRIDE=api-server
      - KUBELET_VOLUMES_PATH=${KUBELET_VOLUMES_PATH}
    command: ["--node-name", "node-2", "--etcd-servers", "http://rhino:2379", "--cluster-dns", "10.96.0.10", "--metrics-port", "10251", "--sync-interval", "3"]

  # Kube-proxy (host network mode for iptables)
  kube-proxy:
    build:
      context: .
      dockerfile: Dockerfile.kube-proxy
    container_name: rusternetes-kube-proxy
    privileged: true
    network_mode: host
    user: "0:0"
    depends_on:
      - api-server
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      - RUST_LOG=info
    command: ["--node-name", "node-1", "--etcd-servers", "http://localhost:2379"]

networks:
  rusternetes-net:
    driver: bridge
    name: rusternetes-network

volumes:
  rhino-data:
    name: rusternetes-rhino-data
