<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rūsternetes Rooster - chunky retro style matching rhino aesthetic -->

  <!-- Comb (top of head) - three pointed ridges -->
  <path d="M15 2 L13 6 L15 5 L16 7 L17 5 L19 6 L17 2 Z" fill="#c85a5a"/>

  <!-- Wattle (below beak) -->
  <path d="M11 15 Q10 17 11 18 Q12 19 12 17 Z" fill="#c85a5a"/>

  <!-- Head -->
  <circle cx="14" cy="10" r="4" fill="#e8722a"/>

  <!-- Eye -->
  <circle cx="13" cy="9" r="1" fill="#1a1410"/>
  <circle cx="13.3" cy="8.7" r="0.3" fill="#f5efe8"/>

  <!-- Beak -->
  <path d="M10 10.5 L7 11 L10 12 Z" fill="#f5c842"/>

  <!-- Body -->
  <ellipse cx="18" cy="18" rx="7" ry="6" fill="#e8722a"/>

  <!-- Rust patina on body -->
  <ellipse cx="18" cy="18" rx="7" ry="6" fill="url(#rooster-patina)" opacity="0.3"/>
  <defs>
    <radialGradient id="rooster-patina" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#f0924a"/>
      <stop offset="60%" stop-color="#e8722a"/>
      <stop offset="100%" stop-color="#a04010"/>
    </radialGradient>
  </defs>

  <!-- Wing -->
  <path d="M16 15 Q20 13 23 15 Q22 18 19 19 Q16 18 16 15 Z" fill="#c85a1a"/>

  <!-- Tail feathers - sweeping upward curves -->
  <path d="M25 16 Q28 10 27 4" stroke="#b54e15" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M24 17 Q29 12 30 6" stroke="#c85a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M24 18 Q30 14 31 9" stroke="#e8722a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <line x1="16" y1="23" x2="14" y2="28" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="23" x2="22" y2="28" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Feet -->
  <path d="M12 28 L14 28 L15 29 M14 28 L14 30 M14 28 L13 29" stroke="#f5c842" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M20 28 L22 28 L23 29 M22 28 L22 30 M22 28 L21 29" stroke="#f5c842" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Pitting / wear spots (rust patina) -->
  <circle cx="20" cy="16" r="0.8" fill="#a04010" opacity="0.4"/>
  <circle cx="17" cy="20" r="0.6" fill="#a04010" opacity="0.3"/>
</svg>
