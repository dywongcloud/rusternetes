apiVersion: v1
kind: Pod
metadata:
  name: hostpath-test
  namespace: default
spec:
  containers:
  - name: host-reader
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Listing files in /host-data:"
        ls -la /host-data/
        echo "Writing test file..."
        echo "Created by hostpath-test pod at $(date)" > /host-data/rusternetes-test.txt
        echo "File created successfully"
        sleep 3600
    volumeMounts:
    - name: host-volume
      mountPath: /host-data
  volumes:
  - name: host-volume
    hostPath:
      path: /tmp/rusternetes-hostpath-test
      type: DirectoryOrCreate
