---
# StorageClass with volume expansion enabled
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: expandable-storage
provisioner: rusternetes.io/hostpath
parameters:
  path: /tmp/rusternetes/expandable-volumes
reclaimPolicy: Delete
allowVolumeExpansion: true

---
# Initial PersistentVolumeClaim with 5Gi
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: expandable-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: expandable-storage
  resources:
    requests:
      storage: 5Gi

---
# Example Pod using the PVC
apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: default
spec:
  containers:
    - name: nginx
      image: nginx:latest
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: expandable-pvc
