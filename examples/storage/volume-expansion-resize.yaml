# To expand a PersistentVolumeClaim, update the storage request:
#
# Step 1: Apply the initial setup from volume-expansion-example.yaml
# Step 2: Update the PVC with a larger storage request (below)
# Step 3: The Volume Expansion controller will automatically resize the volume
#
# Example: Expanding from 5Gi to 10Gi

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: expandable-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: expandable-storage
  resources:
    requests:
      storage: 10Gi  # Updated from 5Gi to 10Gi

---
# You can verify the expansion by checking the PVC status:
# kubectl get pvc expandable-pvc -n default -o yaml
#
# Look for:
# status:
#   capacity:
#     storage: 10Gi
#   phase: Bound
#   resizeStatus: null  # Null when expansion is complete
#   allocatedResources:
#     storage: 10Gi
