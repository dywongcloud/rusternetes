# PersistentVolume
apiVersion: v1
kind: PersistentVolume
metadata:
  name: test-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /tmp/rusternetes-pv-data
    type: DirectoryOrCreate
---
# PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: manual
---
# Pod using the PVC
apiVersion: v1
kind: Pod
metadata:
  name: pvc-test
  namespace: default
spec:
  containers:
  - name: app
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Writing to persistent volume at $(date)" > /mnt/data/app-data.txt
        echo "Data written successfully"
        cat /mnt/data/app-data.txt
        sleep 3600
    volumeMounts:
    - name: persistent-storage
      mountPath: /mnt/data
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: test-pvc
