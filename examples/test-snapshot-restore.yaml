# Example: Restore a PVC from a VolumeSnapshot
#
# This example demonstrates how to restore data from a snapshot to a new PVC.
# Prerequisites:
# 1. Create a StorageClass with a supported provisioner (e.g., rusternetes.io/hostpath)
# 2. Create a PVC and populate it with data
# 3. Create a VolumeSnapshotClass
# 4. Create a VolumeSnapshot of the original PVC
# 5. Create a new PVC with dataSource pointing to the snapshot
#
# Usage:
#   ./target/release/kubectl --server https://localhost:6443 --insecure-skip-tls-verify apply -f examples/test-snapshot-restore.yaml

---
# Step 1: Create a StorageClass
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-storage
provisioner: rusternetes.io/hostpath
parameters:
  path: /tmp/rusternetes/dynamic-pvs
reclaimPolicy: Delete
volumeBindingMode: Immediate

---
# Step 2: Create the original PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: original-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: fast-storage

---
# Step 3: Create a VolumeSnapshotClass
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: hostpath-snapclass
driver: rusternetes.io/hostpath-snapshotter
deletionPolicy: Delete

---
# Step 4: Create a VolumeSnapshot of the original PVC
# Note: The original PVC must be bound before creating a snapshot
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
metadata:
  name: my-snapshot
  namespace: default
spec:
  volumeSnapshotClassName: hostpath-snapclass
  source:
    persistentVolumeClaimName: original-pvc

---
# Step 5: Create a new PVC restored from the snapshot
# This PVC will be dynamically provisioned with data from the snapshot
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: restored-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: fast-storage
  # dataSource specifies the snapshot to restore from
  dataSource:
    kind: VolumeSnapshot
    name: my-snapshot
    apiGroup: snapshot.storage.k8s.io

---
# Step 6: (Optional) Create a pod that uses the restored PVC
apiVersion: v1
kind: Pod
metadata:
  name: restored-pod
  namespace: default
spec:
  containers:
    - name: app
      image: nginx:1.25-alpine
      volumeMounts:
        - name: restored-data
          mountPath: /data
  volumes:
    - name: restored-data
      persistentVolumeClaim:
        claimName: restored-pvc
  restartPolicy: Never
