kind: Deployment
apiVersion: apps/v1
metadata:
  name: nginx-deployment
  namespace: test-namespace
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    match_labels:
      app: nginx
  template:
    metadata:
      name: nginx-pod-template
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
          name: http
