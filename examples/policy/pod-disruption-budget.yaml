apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-pdb
  namespace: default
spec:
  # Minimum number of pods that must be available during disruptions
  minAvailable: 2

  # Label selector to identify which pods this PDB applies to
  selector:
    matchLabels:
      app: web
      tier: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: default
spec:
  # Maximum number of pods that can be unavailable during disruptions
  maxUnavailable: 1

  selector:
    matchLabels:
      app: api
      tier: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: db-pdb-percentage
  namespace: default
spec:
  # Can also use percentages
  maxUnavailable: "20%"

  selector:
    matchLabels:
      app: database
      tier: data
