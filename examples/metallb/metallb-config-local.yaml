# MetalLB Configuration for Local/Bare-Metal Deployments
#
# This configuration is for local networks or bare-metal clusters.
# Adjust the IP address range to match your network configuration.
#
# Prerequisites:
# 1. Install MetalLB:
#    kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.3/config/manifests/metallb-native.yaml
#
# 2. Verify your network range:
#    ip addr show  # or ifconfig
#    Choose IPs that are:
#    - On the same subnet as your nodes
#    - NOT in your DHCP range
#    - NOT currently in use
#
# 3. Apply this configuration:
#    kubectl apply -f metallb-config-local.yaml

---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
  # CHANGE THIS to match your network!
  # Examples:
  # For 192.168.1.0/24 network: 192.168.1.240-192.168.1.250
  # For 192.168.0.0/24 network: 192.168.0.240-192.168.0.250
  # For 10.0.0.0/24 network: 10.0.0.240-10.0.0.250
  - 192.168.1.240-192.168.1.250

  # You can also use CIDR notation:
  # - 192.168.1.240/28  # Provides 14 usable IPs (192.168.1.241-254)

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default-l2
  namespace: metallb-system
spec:
  ipAddressPools:
  - default-pool
  # Optional: Restrict to specific interfaces
  # interfaces:
  # - eth0
