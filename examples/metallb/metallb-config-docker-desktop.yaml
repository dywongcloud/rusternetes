# MetalLB Configuration for Docker Desktop Environments
#
# Docker Desktop uses a different networking model than standard Docker.
# This configuration provides IP addresses that work with Docker Desktop.
#
# Prerequisites:
# 1. Install MetalLB:
#    kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.3/config/manifests/metallb-native.yaml
#
# 2. Apply this configuration:
#    kubectl apply -f metallb-config-docker-desktop.yaml
#
# Note: Docker Desktop networking is more restricted than bare-metal.
# LoadBalancer IPs will be accessible from localhost.

---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: docker-desktop-pool
  namespace: metallb-system
spec:
  addresses:
  # Docker Desktop typically uses 192.168.65.0/24 for VMs
  # Using high IPs to avoid conflicts
  - 192.168.65.240-192.168.65.250

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: docker-desktop-l2
  namespace: metallb-system
spec:
  ipAddressPools:
  - docker-desktop-pool
