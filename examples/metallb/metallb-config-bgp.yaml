# MetalLB BGP Configuration for Production Environments
#
# BGP mode is recommended for production bare-metal deployments where:
# - You have BGP-capable routers
# - You need more advanced load balancing
# - You want better failover and redundancy
#
# Prerequisites:
# 1. BGP router with ASN and peer address
# 2. Your cluster's ASN
# 3. Install MetalLB:
#    kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.3/config/manifests/metallb-native.yaml
#
# 4. Update the values below to match your network
# 5. Apply this configuration:
#    kubectl apply -f metallb-config-bgp.yaml

---
# Define the IP address pool
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: bgp-pool
  namespace: metallb-system
spec:
  addresses:
  # CHANGE THIS to your public or routable IP range
  - 203.0.113.0/24  # Example range - replace with your actual IPs

---
# Configure BGP peer (your router)
apiVersion: metallb.io/v1beta2
kind: BGPPeer
metadata:
  name: router-peer
  namespace: metallb-system
spec:
  # Your cluster's BGP ASN
  myASN: 64500  # CHANGE THIS to your cluster ASN

  # Your router's BGP ASN
  peerASN: 64501  # CHANGE THIS to your router's ASN

  # Your router's IP address
  peerAddress: 192.168.1.1  # CHANGE THIS to your router IP

  # Optional: Authentication
  # password: "your-bgp-password"

  # Optional: Hold time (seconds)
  # holdTime: 180s

---
# Configure BGP advertisement
apiVersion: metallb.io/v1beta1
kind: BGPAdvertisement
metadata:
  name: bgp-advert
  namespace: metallb-system
spec:
  ipAddressPools:
  - bgp-pool

  # Optional: Control which nodes advertise routes
  # nodeSelectors:
  # - matchLabels:
  #     kubernetes.io/hostname: node1

  # Optional: BGP communities for route filtering
  # communities:
  # - 65535:65282  # NO_ADVERTISE
