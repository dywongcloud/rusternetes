# MetalLB Configuration for Podman/Docker Environments
#
# This configuration is optimized for Rusternetes running in Podman containers.
# The IP addresses are from the typical Podman network range (10.88.0.0/16).
#
# Prerequisites:
# 1. Find your Podman network range:
#    podman network inspect podman | grep -A 2 subnet
#
#    Typical output:
#    "subnet": "10.88.0.0/16"
#
# 2. Install MetalLB:
#    kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.3/config/manifests/metallb-native.yaml
#
# 3. Apply this configuration:
#    kubectl apply -f metallb-config-podman.yaml
#
# Note: These IPs will only be accessible from:
# - The host machine
# - Other containers on the same Podman network
# - NOT from external machines (unless you configure port forwarding)

---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: podman-pool
  namespace: metallb-system
spec:
  addresses:
  # IPs from the Podman network range
  # These are high in the range to avoid conflicts with container IPs
  - 10.88.100.1-10.88.100.50

  # If your Podman network uses a different range, adjust accordingly:
  # For 172.16.0.0/12: 172.16.100.1-172.16.100.50
  # For 10.89.0.0/16: 10.89.100.1-10.89.100.50

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: podman-l2
  namespace: metallb-system
spec:
  ipAddressPools:
  - podman-pool
