apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: api-vpa-advanced
  namespace: default
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-server

  updatePolicy:
    updateMode: Auto

  # Resource policy controls VPA recommendations
  resourcePolicy:
    containerPolicies:
    - containerName: api-container
      mode: Auto

      # Minimum allowed resources
      minAllowed:
        cpu: 100m
        memory: 128Mi

      # Maximum allowed resources
      maxAllowed:
        cpu: 4
        memory: 8Gi

      # Which resources VPA should manage
      controlledResources:
      - cpu
      - memory

    # Policy for sidecar container
    - containerName: logging-sidecar
      mode: Auto
      minAllowed:
        cpu: 50m
        memory: 64Mi
      maxAllowed:
        cpu: 200m
        memory: 256Mi
      controlledResources:
      - cpu
      - memory
