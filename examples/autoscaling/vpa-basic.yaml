apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: web-vpa
  namespace: default
spec:
  # Target deployment to manage resources for
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app

  # UpdatePolicy controls how VPA applies recommendations
  # Modes: Off (recommendations only), Initial (on pod creation), Recreate (restart pods), Auto
  updatePolicy:
    updateMode: Auto
