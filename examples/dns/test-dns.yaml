# Example: Testing DNS Resolution in Rusternetes
#
# This example demonstrates:
# 1. A ClusterIP service with DNS resolution
# 2. A headless service with multiple pod IPs
# 3. A test pod to verify DNS queries

---
# Namespace for DNS testing
apiVersion: v1
kind: Namespace
metadata:
  name: dns-test

---
# Regular ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: dns-test
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP

---
# Headless Service (for SRV records)
apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
  namespace: dns-test
spec:
  type: ClusterIP
  clusterIP: None  # Makes it headless
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP

---
# Deployment with 3 replicas
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: dns-test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
          name: http

---
# Test Pod with DNS tools
apiVersion: v1
kind: Pod
metadata:
  name: dns-test-pod
  namespace: dns-test
spec:
  containers:
  - name: dns-tools
    image: alpine:latest
    command:
      - sleep
      - "3600"
  dnsPolicy: Default

---
# Instructions for testing
#
# 1. Apply this file:
#    kubectl apply -f examples/test-dns.yaml
#
# 2. Wait for pods to be running:
#    kubectl get pods -n dns-test
#
# 3. Install DNS tools in test pod:
#    kubectl exec -it dns-test-pod -n dns-test -- apk add bind-tools
#
# 4. Test ClusterIP service DNS:
#    kubectl exec -it dns-test-pod -n dns-test -- dig nginx-service.dns-test.svc.cluster.local
#    # Should return single ClusterIP
#
# 5. Test headless service DNS:
#    kubectl exec -it dns-test-pod -n dns-test -- dig nginx-headless.dns-test.svc.cluster.local
#    # Should return multiple pod IPs
#
# 6. Test SRV records:
#    kubectl exec -it dns-test-pod -n dns-test -- dig SRV _http._tcp.nginx-headless.dns-test.svc.cluster.local
#    # Should return SRV records with pod targets
#
# 7. Test pod DNS (find pod name first):
#    kubectl get pods -n dns-test -l app=nginx
#    kubectl exec -it dns-test-pod -n dns-test -- dig <pod-name>.dns-test.pod.cluster.local
#
# 8. Test short names (within same namespace):
#    kubectl exec -it dns-test-pod -n dns-test -- dig nginx-service
#    # Should resolve with search domains
#
# 9. Verify from host (if DNS exposed on port 53):
#    dig @localhost nginx-service.dns-test.svc.cluster.local
