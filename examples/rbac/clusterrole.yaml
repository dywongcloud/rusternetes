apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-admin
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
rules:
  # Full access to all resources in core API group
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["*"]
  # Full access to apps API group
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["*"]
  # Full access to RBAC resources
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-reader
  labels:
    app: example
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
