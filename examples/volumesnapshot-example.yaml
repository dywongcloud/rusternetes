---
# VolumeSnapshotClass defines the driver and parameters for taking snapshots
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: hostpath-snapclass
driver: rusternetes.io/hostpath-snapshotter
deletionPolicy: Delete
parameters:
  snapshotPath: /tmp/rusternetes/snapshots

---
# StorageClass for dynamic provisioning (required for the PVC)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast
provisioner: rusternetes.io/hostpath
parameters:
  path: /tmp/rusternetes/dynamic-pvs
reclaimPolicy: Delete
volumeBindingMode: Immediate

---
# PersistentVolumeClaim that we'll snapshot
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast

---
# Pod that writes data to the PVC
apiVersion: v1
kind: Pod
metadata:
  name: data-writer
  namespace: default
spec:
  containers:
  - name: writer
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        echo "Writing important data at $(date)" > /data/important.txt
        echo "Data written successfully"
        sleep 3600
    volumeMounts:
    - name: storage
      mountPath: /data
  volumes:
  - name: storage
    persistentVolumeClaim:
      claimName: test-pvc

---
# VolumeSnapshot to capture the state of the PVC
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
metadata:
  name: test-snapshot
  namespace: default
spec:
  volumeSnapshotClassName: hostpath-snapclass
  source:
    persistentVolumeClaimName: test-pvc
