# Development Kubelet Configuration File
# Optimized for local development with relaxed settings
#
# Usage:
#   kubelet --node-name=node-1 --config=examples/configs/kubelet-config-dev.yaml --etcd-servers=http://localhost:2379

apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration

# Use local directory for development
rootDir: ./kubelet-data

# Store volumes in local directory
volumeDir: ./volumes

# More verbose logging for development
logLevel: debug

# Faster sync for quicker feedback during development
syncFrequency: 5

# Standard metrics port
metricsBindPort: 8082
