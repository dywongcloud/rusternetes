# Production Kubelet Configuration File
# Recommended settings for production deployments
#
# Usage:
#   kubelet --node-name=<node-name> --config=/etc/kubernetes/kubelet-config.yaml --etcd-servers=<etcd-endpoints>

apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration

# Standard production paths following Kubernetes conventions
rootDir: /var/lib/kubelet

volumeDir: /var/lib/kubelet/volumes

volumePluginDir: /usr/libexec/kubernetes/kubelet-plugins/volume/exec

# Production logging - only important messages
logLevel: info

# Standard sync interval
syncFrequency: 10

# Standard metrics port (Prometheus compatible)
metricsBindPort: 10255
