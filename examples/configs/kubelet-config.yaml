# Example Kubelet Configuration File
# This file demonstrates production-grade configuration options for the Rusternetes Kubelet
#
# Usage:
#   kubelet --node-name=node-1 --config=/path/to/kubelet-config.yaml --etcd-servers=http://localhost:2379
#
# For more information, see the documentation at docs/KUBELET_CONFIGURATION.md

apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration

# Root directory for managing kubelet files (volume data, plugin state, etc.)
# Default: current working directory (dev) or /var/lib/kubelet (production)
rootDir: /var/lib/kubelet

# Directory path for managing volume data
# Default: <rootDir>/volumes
volumeDir: /var/lib/kubelet/volumes

# Directory where volume plugins are installed
# Default: /usr/libexec/kubernetes/kubelet-plugins/volume/exec
volumePluginDir: /usr/libexec/kubernetes/kubelet-plugins/volume/exec

# How frequently to sync pod state (in seconds)
# Default: 10
syncFrequency: 10

# Port for the metrics server
# Default: 8082
metricsBindPort: 8082

# Log verbosity level
# Valid values: trace, debug, info, warn, error
# Default: info
logLevel: info
