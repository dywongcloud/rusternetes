apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cronjob
  namespace: test-namespace
  labels:
    app: hello
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Allow
  jobTemplate:
    metadata:
      labels:
        app: hello
    spec:
      template:
        metadata:
          labels:
            app: hello
        spec:
          restartPolicy: OnFailure
          containers:
          - name: hello
            image: busybox:1.36
            command:
            - /bin/sh
            - -c
            - date; echo "Hello from Rusternetes CronJob!"
            resources:
              requests:
                memory: "32Mi"
                cpu: "50m"
              limits:
                memory: "64Mi"
                cpu: "100m"
