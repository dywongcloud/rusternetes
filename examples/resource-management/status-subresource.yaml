# Example: Status Subresource
#
# This example demonstrates the /status subresource which allows
# updating only the status portion of a resource without conflicts

---
# Deployment with both spec and status
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80
status:
  replicas: 0
  availableReplicas: 0
  readyReplicas: 0
  updatedReplicas: 0

---
# Example API calls:
#
# 1. User updates spec (changes replicas to 5):
#    PUT /apis/apps/v1/namespaces/default/deployments/nginx-deployment
#    {
#      "spec": {
#        "replicas": 5
#      }
#    }
#
# 2. Controller updates status (reports current state):
#    PUT /apis/apps/v1/namespaces/default/deployments/nginx-deployment/status
#    {
#      "status": {
#        "replicas": 3,
#        "availableReplicas": 3,
#        "readyReplicas": 3,
#        "updatedReplicas": 3
#      }
#    }
#
# Benefits of /status subresource:
# - Prevents conflicts between user changes (spec) and controller changes (status)
# - Allows separate RBAC permissions for spec vs status
# - Provides optimistic concurrency control per subresource
#
# Without /status subresource:
# - User and controller might conflict on resourceVersion
# - User change to spec could be overwritten by controller status update
# - Controller status update could be rejected if user changed spec first
#
# With /status subresource:
# - User updates spec, gets new resourceVersion
# - Controller updates status independently, no conflict
# - Both changes are preserved

---
# Example for StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
  namespace: default
spec:
  serviceName: "nginx"
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80
status:
  replicas: 0
  readyReplicas: 0
  currentReplicas: 0
  updatedReplicas: 0

---
# Example for Job
apiVersion: batch/v1
kind: Job
metadata:
  name: pi
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: pi
        image: perl:5.34
        command: ["perl", "-Mbignum=bpi", "-wle", "print bpi(2000)"]
      restartPolicy: Never
  backoffLimit: 4
status:
  active: 0
  succeeded: 0
  failed: 0
  conditions: []

---
# RBAC Example: Separate permissions for spec vs status
#
