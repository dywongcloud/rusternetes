# Example: Owner References and Garbage Collection
#
# This example demonstrates:
# 1. Setting owner references
# 2. Cascade deletion behavior
# 3. Orphaning dependents

---
# Parent ReplicaSet
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: parent-replicaset
  namespace: default
  uid: rs-12345-abc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: parent-app
  template:
    metadata:
      labels:
        app: parent-app
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2

---
# Child Pod with owner reference (will be deleted when parent is deleted)
apiVersion: v1
kind: Pod
metadata:
  name: child-pod-1
  namespace: default
  ownerReferences:
  - apiVersion: apps/v1
    kind: ReplicaSet
    name: parent-replicaset
    uid: rs-12345-abc
    controller: true
    blockOwnerDeletion: true
spec:
  containers:
  - name: nginx
    image: nginx:1.14.2

---
# Another child Pod with owner reference
apiVersion: v1
kind: Pod
metadata:
  name: child-pod-2
  namespace: default
  ownerReferences:
  - apiVersion: apps/v1
    kind: ReplicaSet
    name: parent-replicaset
    uid: rs-12345-abc
    controller: true
spec:
  containers:
  - name: nginx
    image: nginx:1.14.2

---
# Orphan Pod (has owner reference, but owner doesn't exist)
# This will be cleaned up by the garbage collector
apiVersion: v1
kind: Pod
metadata:
  name: orphan-pod
  namespace: default
  ownerReferences:
  - apiVersion: apps/v1
    kind: ReplicaSet
    name: non-existent-replicaset
    uid: rs-99999-xyz
    controller: true
spec:
  containers:
  - name: nginx
    image: nginx:1.14.2

---
# Example deletion with propagation policy
# To delete with orphaning (keep children):
# DELETE /api/v1/namespaces/default/replicasets/parent-replicaset
# {
#   "propagationPolicy": "Orphan"
# }

# To delete with foreground deletion (delete children first):
# DELETE /api/v1/namespaces/default/replicasets/parent-replicaset
# {
#   "propagationPolicy": "Foreground"
# }

# To delete with background deletion (delete parent, GC cleans children):
# DELETE /api/v1/namespaces/default/replicasets/parent-replicaset
# {
#   "propagationPolicy": "Background"
# }
