# Example: Finalizers and Pre-deletion Hooks
#
# This example demonstrates:
# 1. Adding finalizers to resources
# 2. Deletion with finalizers
# 3. Controller removing finalizers after cleanup

---
# Namespace with finalizer (cannot be deleted until finalizer is removed)
apiVersion: v1
kind: Namespace
metadata:
  name: protected-namespace
  finalizers:
  - kubernetes.io/namespace-protection
  - example.com/custom-cleanup

---
# PersistentVolume with finalizer
apiVersion: v1
kind: PersistentVolume
metadata:
  name: protected-pv
  finalizers:
  - kubernetes.io/pv-protection
  - example.com/volume-cleanup
spec:
  capacity:
    storage: 10Gi
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /mnt/data

---
# Pod with custom finalizer
apiVersion: v1
kind: Pod
metadata:
  name: pod-with-finalizer
  namespace: default
  finalizers:
  - example.com/cleanup-external-resources
spec:
  containers:
  - name: nginx
    image: nginx:1.14.2

---
# Example: Deletion lifecycle with finalizers
#
# 1. User deletes the resource:
#    DELETE /api/v1/namespaces/default/pods/pod-with-finalizer
#
# 2. API server marks it for deletion (sets deletionTimestamp)
#    but does NOT delete it yet because it has finalizers
#
# 3. Controller watches for resources with deletionTimestamp
#    and performs cleanup (e.g., delete external resources)
#
# 4. Controller removes its finalizer:
#    PATCH /api/v1/namespaces/default/pods/pod-with-finalizer
#    {
#      "metadata": {
#        "finalizers": []
#      }
#    }
#
# 5. API server sees no finalizers remain and deletes the resource

