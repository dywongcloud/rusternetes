# Example: TTL After Finished for Jobs
#
# This example demonstrates automatic cleanup of completed Jobs
# using the TTL controller

---
# Job that will be cleaned up 100 seconds after completion
apiVersion: batch/v1
kind: Job
metadata:
  name: ttl-job-success
  namespace: default
  annotations:
    # TTL in seconds - job will be deleted 100s after completion
    ttlSecondsAfterFinished: "100"
spec:
  template:
    spec:
      containers:
      - name: pi
        image: perl:5.34
        command: ["perl", "-Mbignum=bpi", "-wle", "print bpi(2000)"]
      restartPolicy: Never
  backoffLimit: 4

---
# Job that will be cleaned up immediately after completion (0 seconds)
apiVersion: batch/v1
kind: Job
metadata:
  name: ttl-job-immediate
  namespace: default
  annotations:
    ttlSecondsAfterFinished: "0"
spec:
  template:
    spec:
      containers:
      - name: hello
        image: busybox
        command: ["echo", "Hello from the Job!"]
      restartPolicy: Never

---
# Job that will be cleaned up 1 hour (3600 seconds) after completion
apiVersion: batch/v1
kind: Job
metadata:
  name: ttl-job-delayed
  namespace: default
  annotations:
    ttlSecondsAfterFinished: "3600"
spec:
  template:
    spec:
      containers:
      - name: date
        image: busybox
        command: ["date"]
      restartPolicy: Never
  completions: 1
  parallelism: 1

---
# Job that will be cleaned up after failure
apiVersion: batch/v1
kind: Job
metadata:
  name: ttl-job-failure
  namespace: default
  annotations:
    # Will be cleaned up 300s after failing
    ttlSecondsAfterFinished: "300"
spec:
  template:
    spec:
      containers:
      - name: fail
        image: busybox
        command: ["sh", "-c", "exit 1"]
      restartPolicy: Never
  backoffLimit: 1

---
# Notes:
#
# 1. The TTL controller checks finished Jobs every 60 seconds by default
# 2. A Job is considered "finished" when it has a condition with type
#    "Complete" or "Failed" and status "True"
# 3. The TTL is counted from the lastTransitionTime of the condition
# 4. When the TTL expires, the Job AND all its Pods are deleted
# 5. Setting ttlSecondsAfterFinished to 0 means delete immediately after finishing
#
# Lifecycle:
# 1. Job is created and runs
# 2. Job completes (or fails)
# 3. TTL controller sees the Job is finished
# 4. TTL controller waits for ttlSecondsAfterFinished
# 5. TTL controller deletes the Job and its Pods
