---
# StorageClass for dynamic provisioning
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast
provisioner: rusternetes.io/hostpath
parameters:
  path: /tmp/rusternetes/dynamic-pvs
reclaimPolicy: Delete
volumeBindingMode: Immediate

---
# PersistentVolumeClaim that will be dynamically provisioned
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dynamic-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast
  volumeMode: Filesystem

---
# Pod that uses the dynamically provisioned PVC
apiVersion: v1
kind: Pod
metadata:
  name: dynamic-volume-pod
  namespace: default
spec:
  containers:
  - name: app
    image: nginx:1.25-alpine
    volumeMounts:
    - name: storage
      mountPath: /data
  volumes:
  - name: storage
    persistentVolumeClaim:
      claimName: dynamic-pvc
