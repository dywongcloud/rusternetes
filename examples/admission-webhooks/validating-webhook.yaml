apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: example-validating-webhook
webhooks:
  - name: pod-policy.example.com
    clientConfig:
      # Option 1: Use a URL directly
      url: https://external-admission-webhook.example.com:8443/validate-pods
      # Option 2: Use a service reference
      # service:
      #   namespace: webhook-system
      #   name: webhook-service
      #   path: /validate-pods
      #   port: 443
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: "Namespaced"
    admissionReviewVersions: ["v1", "v1beta1"]
    sideEffects: None
    timeoutSeconds: 10
    failurePolicy: Fail
    matchPolicy: Exact
    namespaceSelector:
      matchLabels:
        environment: production
