apiVersion: batch/v1
kind: Job
metadata:
  name: pi-calculation
  namespace: test-namespace
  labels:
    app: pi-calculator
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: pi-calculator
    spec:
      restartPolicy: Never
      containers:
      - name: pi
        image: perl:5.34-slim
        command: ["perl", "-Mbignum=bpi", "-wle", "print bpi(2000)"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
