apiVersion: v1
kind: Pod
metadata:
  name: emptydir-test
  namespace: default
spec:
  containers:
  - name: writer
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Writing data at $(date)" > /data/test.txt
        echo "Data written successfully"
        sleep 3600
    volumeMounts:
    - name: shared-data
      mountPath: /data
  - name: reader
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        sleep 5
        echo "Reading data from volume:"
        cat /data/test.txt
        sleep 3600
    volumeMounts:
    - name: shared-data
      mountPath: /data
      readOnly: true
  volumes:
  - name: shared-data
    emptyDir: {}
