---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: default
---
# Standard kubernetes service in default namespace
# This is what clients use to discover the API server
# Pin to 10.96.0.1 for stability (first service in the cluster)
apiVersion: v1
kind: Service
metadata:
  name: kubernetes
  namespace: default
  labels:
    component: apiserver
    provider: kubernetes
spec:
  clusterIP: "10.96.0.1"
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: 6443
  type: ClusterIP
---
# Built-in PriorityClasses (K8s creates these automatically)
# system-node-critical: highest priority, for node-level system pods
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: system-node-critical
value: 2000001000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Used for system critical pods that must not be moved from their current node."
---
# system-cluster-critical: high priority, for cluster-level system pods (CoreDNS, etc.)
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: system-cluster-critical
value: 2000000000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Used for system critical pods that must run in the cluster but can be moved to another node if necessary."
---
# CoreDNS Pod
apiVersion: v1
kind: Pod
metadata:
  name: coredns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
spec:
  serviceAccountName: default
  priorityClassName: system-cluster-critical
  priority: 2000000000
  tolerations:
  - operator: Exists
  containers:
  - name: coredns
    image: coredns/coredns:1.11.1
    args:
    - -conf
    - /etc/coredns/Corefile
    ports:
    - containerPort: 53
      name: dns
      protocol: UDP
    - containerPort: 53
      name: dns-tcp
      protocol: TCP
    - containerPort: 9153
      name: metrics
      protocol: TCP
    volumeMounts:
    - name: config-volume
      mountPath: /etc/coredns
      readOnly: true
  volumes:
  - name: config-volume
    configMap:
      name: coredns
      items:
      - key: Corefile
        path: Corefile
  dnsPolicy: Default
  restartPolicy: Always
---
# CoreDNS Service (kube-dns)
# Pin to 10.96.0.10 for stability (like real Kubernetes often does)
# This ensures kubelet always discovers the same DNS IP
apiVersion: v1
kind: Service
metadata:
  name: kube-dns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
    kubernetes.io/cluster-service: "true"
    kubernetes.io/name: CoreDNS
spec:
  selector:
    k8s-app: kube-dns
  clusterIP: "10.96.0.10"
  ports:
  - name: dns
    port: 53
    protocol: UDP
  - name: dns-tcp
    port: 53
    protocol: TCP
  - name: metrics
    port: 9153
    protocol: TCP
---
# CoreDNS ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
          lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
          endpoint https://api-server:6443
          tls "" "" /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        }
        prometheus :9153
        forward . 8.8.8.8 {
          max_concurrent 1000
        }
        cache 30
        loop
        reload
        loadbalance
    }
